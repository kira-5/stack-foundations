# UAT API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_lesliespool_test/"

[prod]
# Production API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_lesliespool_prod/"
