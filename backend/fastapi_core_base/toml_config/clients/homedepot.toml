###############################################################################
# Home Depot Client Configuration
#
# This file contains client-specific configuration values for Home Depot.
# These values are used to populate the template variables in settings.toml.
###############################################################################

[DEFAULT]

# =============================================================================
# 1. Client Identity
# =============================================================================

# Client Name
# Official name of the client (used for folders, etc.).
CLIENT_NAME = "homedepot"

# Tenant ID
# Unique identifier for the tenant context.
TENANT_ID = "homedepot"

# Client Alias
# Short alias for the client.
CLIENT_ALIAS = "homedepot"

# Tenant App Schema
TENANT_APP_SCHEMA = "base_pricing"


# =============================================================================
# 2. GCP Infrastructure
# =============================================================================

# GCP Project ID
# The ID of the Google Cloud Project.
PROJECT_ID = "homedepot-10122024"

# GCP Project Number
# The numeric ID of the Google Cloud Project.
PROJECT_NUMBER = "748477855538"

# GCP Project Name
# The display name of the project.
PROJECT_NAME = "homedepot"

# GCS Bucket
# Main storage bucket for this client.
GCS_BUCKET = "homedepot_basesmart"

# Service Account Email
# Template for the service account email (uses {env} placeholder).
SERVICE_ACCOUNT_EMAIL = "core-homedepot-{env}@homedepot-10122024.iam.gserviceaccount.com"


# =============================================================================
# 3. Secret Management
# =============================================================================

# Google Secret Name
# Name of the secret in Secret Manager.
GOOGLE_SECRET_NAME = "homedepot"

# MTP Secret Name
# Name of the environment variables secret.
MTP_SECRET_NAME = "env_variables"

# Secret Version
# Version of the secret to access.
SECRET_VERSION = "latest"


# =============================================================================
# 4. Feature Toggles
# =============================================================================

# Datadog Enabled
# Enable Datadog observability for this client.
DATADOG_ENABLED = true


# =============================================================================
# 5. External APIs
# =============================================================================

# Gurobi API URL (Default)
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_homedepot_test/"


###############################################################################
# Environment-Specific Overrides
###############################################################################

[dev]
# Development API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_homedepot_test/"

[test]
# Testing API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_homedepot_test/"

[uat]
# UAT API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_homedepot_prod/"

[prod]
# Production API Endpoint
GUROBI_API_URL = "http://gurobi-internal.iaproducts.ai:6673/solve_basesmart_homedepot_prod/"
